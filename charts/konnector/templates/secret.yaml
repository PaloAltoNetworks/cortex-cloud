{{- /* NOTE: "konnnector" typo (3 n's) is intentional - maintained for backward compatibility */ -}}
{{- $seed := "--set-by-konnnector-at-runtime--" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.system.secrets.backendAuth.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ $seed | quote }}
  refreshToken: {{ $seed | quote }}
  sosToken: {{ $seed | quote }}
  chapi: {{ $seed | quote }}
---
apiVersion: v1
kind: Secret
type: kubernetes.io/dockerconfigjson
metadata:
  name: {{ .Values.system.secrets.dockerSecret.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
data:
  .dockerconfigjson: {{ .Values.dockerPullSecret | default ( "{}" | b64enc ) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: distribution-id
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
type: Opaque
stringData:
  distribution-id: {{ .Values.distribution.id | required "The distribution.id value is required!" | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: konnector-proxy
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
type: Opaque
stringData:
  httpProxy: {{ .Values.proxyValues.httpProxy | default "" | quote }}
  noProxy: {{ .Values.proxyValues.noProxy | default "" | quote }}